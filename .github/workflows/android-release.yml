name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-android-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.41.5"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: olive-carving-android-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

      - name: Ensure GitHub release exists
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="docs/RELEASE_NOTES_${TAG}.md"

          if ! gh release view "$TAG" >/dev/null 2>&1; then
            if [ -f "$NOTES_FILE" ]; then
              gh release create "$TAG" --verify-tag --title "ć¦„é›•äş‘č‰ş $TAG" --notes-file "$NOTES_FILE" || true
            else
              gh release create "$TAG" --verify-tag --title "ć¦„é›•äş‘č‰ş $TAG" --generate-notes || true
            fi
          fi

          for i in 1 2 3 4 5; do
            gh release view "$TAG" >/dev/null 2>&1 && exit 0
            sleep 3
          done

          echo "GitHub release $TAG is not available yet."
          exit 1

      - name: Publish GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload ${{ github.ref_name }} build/app/outputs/flutter-apk/app-release.apk --clobber
